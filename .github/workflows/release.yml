name: Release Firmware

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versions-Bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write # Wichtig, damit der Bot Tags pushen und Releases erstellen darf

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Install cargo-edit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Install cargo-edit
        # Nutzt vorkompilierte Binaries, das dauert nur Sekunden statt Minuten
        uses: taiki-e/install-action@cargo-edit

      - name: Bump Version & Push Tag
        id: bump
        run: |
          # Cargo.toml Version aktualisieren
          cargo set-version --bump ${{ github.event.inputs.version }}
          
          # Die neue Version auslesen, um sie für das Release zu nutzen
          NEW_VERSION=$(grep '^version' Cargo.toml | head -1 | awk -F '"' '{print $2}')
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Änderungen committen und taggen
          git add Cargo.toml
          git commit -m "chore: bump version to v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --follow-tags

      - name: Install elf2uf2-rs
        run: cargo install elf2uf2-rs

      - name: Build Firmware
        run: cargo build --release

      - name: Convert to UF2
        # Hinweis: Der Name muss exakt mit 'name' in der Cargo.toml übereinstimmen!
        # In deiner Cargo.toml steht "firmeware" mit 'e' in der Mitte.
        run: elf2uf2-rs target/thumbv6m-none-eabi/release/stream-deck-pico-firmeware pico-streamdeck.uf2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: "Firmware v${{ steps.bump.outputs.version }}"
          body: "Neues Update für die Streamdeck Firmware."
          files: pico-streamdeck.uf2
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
